<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Visualizador 3D - STAGE</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    html,body { height:100%; margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial; background:#0b1020; color:#fff; }
    .container { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; padding:20px; box-sizing:border-box; }
    h1 { margin-bottom:10px; font-size:1.5rem; }
    model-viewer {
      width: min(1100px, 95vw);
      height: 75vh;
      background: linear-gradient(180deg,#0f1724 0%, #07101a 100%);
      border-radius:10px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.6);
    }
    footer { margin-top:12px; font-size:0.9rem; opacity:0.8; }
  </style>
</head>
<body>
  <div class="container">
    <h1>STAGE - 3D Viewer</h1>
    <model-viewer src="model.glb" alt="STAGE 3D" camera-controls auto-rotate ar shadow-intensity="1" exposure="1.2"></model-viewer>
    <footer>© 2025 - Visualizador 3D via model-viewer</footer>
  </div>
</body>
</html>
